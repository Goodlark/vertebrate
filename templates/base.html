<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ecdcb6">
<title>{% block title %}{{ site_title }} — Humanoid Robots, Physical AI &amp; Driverless News{% endblock %}</title>
<meta name="description" content="{% block description %}{{ site_desc }}{% endblock %}">
<meta name="robots" content="index, follow, max-image-preview:large">
<link rel="canonical" href="https://{{ domain }}/{{ page_path }}">
<link rel="icon" href="{{ root }}favicon.svg" type="image/svg+xml">
<!-- Open Graph / social -->
<meta property="og:site_name" content="{{ site_title }}">
<meta property="og:type" content="{% block og_type %}website{% endblock %}">
<meta property="og:title" content="{{ self.title()|striptags }}">
<meta property="og:description" content="{{ self.description()|striptags }}">
<meta property="og:url" content="https://{{ domain }}/{{ page_path }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ self.title()|striptags }}">
<meta name="twitter:description" content="{{ self.description()|striptags }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Special+Elite&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ root }}style.css">
{% block head_extra %}{% endblock %}
</head>
<body>
<div class="wrap">
{% block body %}{% endblock %}
</div>
</body>
</html>
